services:
  - type: web
    name: forex-trading-backend
    env: python
    region: frankfurt  # Closest to EU Forex markets
    plan: starter      # Upgrade to standard for production
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: OANDA_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: OANDA_ACCOUNT_ID
        sync: false
      - key: OANDA_ENVIRONMENT
        value: live   # Switch to "live" for real money
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD_HASH
        sync: false   # Set manually in Render dashboard
      - key: MONITOR_INTERVAL_SECONDS
        value: "30"
      - key: LOG_LEVEL
        value: INFO
